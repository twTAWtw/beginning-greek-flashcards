<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Greek Flashcards</title>
<style>
  @font-face {
    font-family: 'SBL BibLit';
    src: url('SBL_BLit.ttf') format('truetype');
    font-weight: normal; font-style: normal;
  }

  :root { --gk: 'SBL BibLit', 'Palatino Linotype', Palatino, Georgia, serif; }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px;
  }

  h1 {
    font-size: 1.5rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    color: #c9a96e;
    margin-bottom: 24px;
  }

  /* Controls */
  .controls {
    display: flex;
    flex-direction: column;
    gap: 14px;
    width: 100%;
    max-width: 560px;
    margin-bottom: 28px;
  }

  .control-row {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }

  label {
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #888;
    white-space: nowrap;
  }

  /* Chapter checkboxes */
  .chapter-panel {
    width: 100%;
    background: #16213e;
    border: 1px solid #2a3a5c;
    border-radius: 10px;
    padding: 12px 14px;
  }

  .chapter-panel-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }

  .chapter-panel-header label {
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #888;
  }

  .btn-all {
    background: none;
    border: 1px solid #2a3a5c;
    border-radius: 6px;
    color: #c9a96e;
    padding: 3px 10px;
    font-size: 0.75rem;
    cursor: pointer;
    transition: background 0.15s;
  }

  .btn-all:hover { background: #1e2d4a; }

  .chapter-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .ch-label {
    display: flex;
    align-items: center;
    gap: 5px;
    background: #1a1a2e;
    border: 1px solid #2a3a5c;
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 0.82rem;
    color: #aaa;
    cursor: pointer;
    user-select: none;
    transition: border-color 0.15s, color 0.15s;
  }

  .ch-label:hover { border-color: #c9a96e; color: #e0e0e0; }

  .ch-label input { display: none; }

  .ch-label.checked {
    border-color: #c9a96e;
    background: #1e2a3e;
    color: #c9a96e;
    font-weight: 600;
  }

  .mode-toggle {
    display: flex;
    background: #16213e;
    border: 1px solid #2a3a5c;
    border-radius: 8px;
    overflow: hidden;
    flex: 1;
  }

  .mode-btn {
    flex: 1;
    padding: 8px 12px;
    background: none;
    border: none;
    color: #888;
    font-size: 0.85rem;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }

  .mode-btn.active {
    background: #c9a96e;
    color: #1a1a2e;
    font-weight: 600;
  }

  .order-toggle {
    display: flex;
    background: #16213e;
    border: 1px solid #2a3a5c;
    border-radius: 8px;
    overflow: hidden;
  }

  .order-btn {
    padding: 8px 14px;
    background: none;
    border: none;
    color: #888;
    font-size: 0.85rem;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }

  .order-btn.active {
    background: #c9a96e;
    color: #1a1a2e;
    font-weight: 600;
  }

  .set-toggle {
    display: flex;
    background: #16213e;
    border: 1px solid #2a3a5c;
    border-radius: 8px;
    overflow: hidden;
  }

  .set-btn {
    padding: 8px 18px;
    background: none;
    border: none;
    color: #888;
    font-size: 0.85rem;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }

  .set-btn.active {
    background: #c9a96e;
    color: #1a1a2e;
    font-weight: 600;
  }

  /* Card */
  .card-area {
    width: 100%;
    max-width: 560px;
    perspective: 1200px;
    margin-bottom: 24px;
  }

  .card {
    width: 100%;
    min-height: 240px;
    position: relative;
    cursor: pointer;
    transform-style: preserve-3d;
    transition: transform 0.45s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .card.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    inset: 0;
    min-height: 240px;
    background: #16213e;
    border: 1px solid #2a3a5c;
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 28px;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
  }

  .card-face.back { transform: rotateY(180deg); }

  .card-hint {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: #555;
    margin-bottom: 20px;
    user-select: none;
  }

  .card-main {
    font-family: var(--gk);
    font-size: 2.2rem;
    font-weight: 500;
    color: #f0e6d0;
    text-align: center;
    line-height: 1.3;
    margin-bottom: 10px;
  }

  .card-face.back .card-main {
    font-size: 1.6rem;
    color: #c9a96e;
  }

  .card-sub {
    font-family: var(--gk);
    font-size: 0.95rem;
    color: #99a;
    text-align: center;
    font-style: normal;
    margin-top: 6px;
  }

  .card-face.front .card-sub {
    color: #aab;
  }

  .flip-hint {
    font-size: 0.72rem;
    color: #444;
    margin-top: 18px;
    user-select: none;
  }

  /* Navigation */
  .nav {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 20px;
  }

  .nav-btn {
    background: #16213e;
    border: 1px solid #2a3a5c;
    border-radius: 10px;
    color: #c9a96e;
    width: 44px;
    height: 44px;
    font-size: 1.3rem;
    cursor: pointer;
    transition: background 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .nav-btn:hover:not(:disabled) { background: #1e2d4a; }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }

  .progress {
    font-size: 0.85rem;
    color: #666;
    min-width: 80px;
    text-align: center;
  }

  .progress-bar-wrap {
    width: 100%;
    max-width: 560px;
    height: 4px;
    background: #16213e;
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    background: #c9a96e;
    border-radius: 2px;
    transition: width 0.3s;
  }

  /* Empty state */
  .empty {
    color: #555;
    font-size: 0.9rem;
    margin-top: 40px;
  }

  /* Card wrapper needs a fixed height for absolute children */
  .card-area .card { height: 240px; }
  .card-face { height: 240px; min-height: unset; }

  /* Search */
  .search-wrap {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 100%;
    max-width: 560px;
    margin-bottom: 16px;
  }

  .search-box {
    position: relative;
    flex: 1;
    min-width: 0;
  }

  .search-input {
    width: 100%;
    background: #16213e;
    border: 1px solid #2a3a5c;
    border-radius: 8px;
    color: #e0e0e0;
    font-size: 0.92rem;
    padding: 9px 12px 9px 32px;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }

  .search-input::placeholder { color: #555; }
  .search-input:focus { border-color: #c9a96e; }

  .search-input-gr {
    font-family: var(--gk);
    font-size: 1rem;
    padding-right: 36px;
  }

  .search-icon {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: #555;
    font-size: 0.85rem;
    pointer-events: none;
    line-height: 1;
  }

  .search-pending {
    position: absolute;
    right: 9px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 0.72rem;
    color: #c9a96e;
    pointer-events: none;
    font-family: monospace;
    line-height: 1;
    letter-spacing: -0.02em;
  }

  .search-results {
    position: absolute;
    top: calc(100% + 4px);
    left: 0;
    right: 0;
    background: #16213e;
    border: 1px solid #2a3a5c;
    border-radius: 10px;
    max-height: 300px;
    overflow-y: auto;
    z-index: 100;
    display: none;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  }

  .search-results.open { display: block; }

  .search-result-item {
    padding: 10px 12px;
    cursor: pointer;
    border-bottom: 1px solid #1e2840;
    display: flex;
    gap: 10px;
    align-items: baseline;
  }

  .search-result-item:last-child { border-bottom: none; }
  .search-result-item:hover { background: #1e2d4a; }
  .search-result-item.not-in-deck { opacity: 0.55; }

  .sri-greek {
    color: #f0e6d0;
    font-size: 1rem;
    flex-shrink: 0;
    font-family: var(--gk);
  }

  .sri-english {
    color: #888;
    font-size: 0.82rem;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .sri-ch {
    margin-left: auto;
    color: #555;
    font-size: 0.75rem;
    flex-shrink: 0;
  }

  .search-no-results {
    padding: 12px;
    color: #555;
    font-size: 0.85rem;
    text-align: center;
  }

  /* Key reference */
  .keymap {
    width: 100%;
    max-width: 560px;
    background: #16213e;
    border: 1px solid #2a3a5c;
    border-radius: 10px;
    padding: 10px 14px 12px;
    margin-bottom: 20px;
  }

  .keymap summary {
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #666;
    cursor: pointer;
    user-select: none;
    list-style: none;
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 0;
    outline: none;
  }

  .keymap summary::-webkit-details-marker { display: none; }

  .keymap summary::after {
    content: '▾';
    font-size: 0.6rem;
    color: #555;
  }

  details.keymap[open] summary {
    margin-bottom: 10px;
  }

  details.keymap[open] summary::after {
    content: '▴';
  }

  .km-grid {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 4px;
    margin-bottom: 10px;
  }

  .km-cell {
    background: #1a1a2e;
    border: 1px solid #263050;
    border-radius: 5px;
    padding: 4px 3px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1px;
  }

  .km-key {
    font-family: monospace;
    font-size: 0.65rem;
    color: #555;
    line-height: 1;
  }

  .km-lo {
    font-family: var(--gk);
    font-size: 1rem;
    color: #f0e6d0;
    line-height: 1.2;
  }

  .km-hi {
    font-family: var(--gk);
    font-size: 0.68rem;
    color: #666;
    line-height: 1;
  }

  .km-rule {
    border: none;
    border-top: 1px solid #1e2840;
    margin: 8px 0;
  }

  .km-diacritics {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
  }

  .km-diac {
    display: flex;
    align-items: baseline;
    gap: 4px;
    background: #1a1a2e;
    border: 1px solid #263050;
    border-radius: 5px;
    padding: 3px 7px 3px 6px;
  }

  .km-diac-key {
    font-family: monospace;
    font-size: 0.78rem;
    color: #c9a96e;
    line-height: 1;
  }

  .km-diac-ex {
    font-family: var(--gk);
    font-size: 0.9rem;
    color: #aaa;
  }

  .km-diac-name {
    font-size: 0.68rem;
    color: #555;
  }

  .km-note {
    font-size: 0.72rem;
    color: #555;
    margin-top: 8px;
    line-height: 1.5;
  }

  .km-note strong {
    font-family: var(--gk);
    color: #777;
    font-weight: normal;
  }

  @media (max-width: 520px) {
    .control-row {
      flex-direction: column;
      align-items: stretch;
    }
    .mode-toggle,
    .order-toggle,
    .set-toggle {
      width: 100%;
    }
    .set-btn,
    .order-btn {
      flex: 1;
    }
  }
</style>
</head>
<body>

<h1>&#x1F4D6; Greek Flashcards</h1>

<div class="search-wrap" id="searchWrap">
  <div class="search-box">
    <span class="search-icon">&#x2315;</span>
    <input type="search" class="search-input" id="searchEN"
      placeholder="Search English…"
      autocomplete="off" autocorrect="off" spellcheck="false">
    <div class="search-results" id="searchResultsEN"></div>
  </div>
  <div class="search-box">
    <span class="search-icon">&#x2315;</span>
    <input type="search" class="search-input search-input-gr" id="searchGR"
      placeholder="Search Greek (a→α)…"
      autocomplete="off" autocorrect="off" spellcheck="false" autocapitalize="off">
    <span class="search-pending" id="searchPending"></span>
    <div class="search-results" id="searchResultsGR"></div>
  </div>
</div>

<details class="keymap">
  <summary>Key Reference</summary>
  <div class="km-grid" id="kmGrid"></div>
  <hr class="km-rule">
  <div class="km-diacritics">
    <div class="km-diac"><span class="km-diac-key">)</span><span class="km-diac-ex">ἀ</span><span class="km-diac-name">smooth</span></div>
    <div class="km-diac"><span class="km-diac-key">(</span><span class="km-diac-ex">ἁ</span><span class="km-diac-name">rough</span></div>
    <div class="km-diac"><span class="km-diac-key">/</span><span class="km-diac-ex">ά</span><span class="km-diac-name">acute</span></div>
    <div class="km-diac"><span class="km-diac-key">\</span><span class="km-diac-ex">ὰ</span><span class="km-diac-name">grave</span></div>
    <div class="km-diac"><span class="km-diac-key">=</span><span class="km-diac-ex">ᾶ</span><span class="km-diac-name">circumflex</span></div>
    <div class="km-diac"><span class="km-diac-key">|</span><span class="km-diac-ex">ᾳ</span><span class="km-diac-name">iota sub</span></div>
    <div class="km-diac"><span class="km-diac-key">+</span><span class="km-diac-ex">ϊ</span><span class="km-diac-name">diaeresis</span></div>
  </div>
  <p class="km-note">
    Combine before or after vowel: <strong>)a/</strong> → ἄ &nbsp;·&nbsp; <strong>(w=|</strong> → ᾧ &nbsp;·&nbsp; Shift for Α Β Γ…
  </p>
</details>

<div class="controls">
  <div class="control-row">
    <label>Set</label>
    <div class="set-toggle">
      <button class="set-btn active" id="btnBNTG">BNTG</button>
      <button class="set-btn" id="btnGDNTG">GDNTG</button>
    </div>
  </div>
  <div class="chapter-panel">
    <div class="chapter-panel-header">
      <label>Chapters</label>
      <button class="btn-all" id="btnAll">All</button>
      <button class="btn-all" id="btnNone">None</button>
    </div>
    <div class="chapter-grid" id="chapterGrid"></div>
  </div>
  <div class="control-row">
    <label>Mode</label>
    <div class="mode-toggle">
      <button class="mode-btn active" id="btnGE">Greek → English</button>
      <button class="mode-btn" id="btnEG">English → Greek</button>
    </div>
    <div class="order-toggle">
      <button class="order-btn active" id="btnOrdered">In Order</button>
      <button class="order-btn" id="btnShuffled">&#x21BB; Shuffled</button>
    </div>
  </div>
</div>

<div class="card-area" id="cardArea">
  <div class="card" id="card" onclick="flipCard()">
    <div class="card-face front">
      <div class="card-hint" id="frontHint">GREEK</div>
      <div class="card-main" id="frontMain">—</div>
      <div class="card-sub" id="frontSub"></div>
      <div class="flip-hint">click to reveal</div>
    </div>
    <div class="card-face back">
      <div class="card-hint" id="backHint">ENGLISH</div>
      <div class="card-main" id="backMain">—</div>
      <div class="card-sub" id="backSub"></div>
    </div>
  </div>
</div>

<div class="nav">
  <button class="nav-btn" id="btnPrev" onclick="navigate(-1)">&#8592;</button>
  <div class="progress" id="progress">0 / 0</div>
  <button class="nav-btn" id="btnNext" onclick="navigate(1)">&#8594;</button>
</div>

<div class="progress-bar-wrap">
  <div class="progress-bar" id="progressBar"></div>
</div>

<script>
const RAW_BNTG = `## Chapter 1

// ── Parse ──────────────────────────────────────────────────────────────────
function parseVocab(raw) {
  const chapters = {};
  let current = null;
  for (const line of raw.split('\n')) {
    const trimmed = line.trim();
    if (!trimmed) continue;
    const chMatch = trimmed.match(/^## Chapter (\d+)/);
    if (chMatch) {
      current = parseInt(chMatch[1], 10);
      chapters[current] = [];
      continue;
    }
    if (current === null) continue;
    // Split on 2+ whitespace to separate Greek from English
    const parts = trimmed.split(/\s{2,}/);
    if (parts.length < 2) continue;
    const greek = parts[0].trim();
    const rest  = parts.slice(1).join(' ').trim();
    // Extract cognate in trailing parentheses (last paren group)
    const cognateMatch = rest.match(/^(.*?)\s*\(([^)]+)\)\s*$/);
    let english, cognate;
    if (cognateMatch && !/^[\u0370-\u03FF\u1F00-\u1FFF]/.test(cognateMatch[2].trim())) {
      english = cognateMatch[1].trim();
      cognate = cognateMatch[2].trim();
    } else {
      english = rest;
      cognate = '';
    }
    // Clean up trailing/leading punctuation on english
    english = english.replace(/[,;]\s*$/, '').trim();
    // If no english gloss (entire entry was in parens), restore parens and use as the gloss
    if (!english && cognate) {
      english = `(${cognate})`;
      cognate = '';
    }
    if (greek && english) {
      chapters[current].push({ greek, english, cognate });
    }
  }
  return chapters;
}

// ── State ───────────────────────────────────────────────────────────────────
const vocabSets = { bntg: parseVocab(RAW_BNTG), gdntg: parseVocab(RAW_GDNTG) };
let activeSet  = 'bntg';
let deck       = [];
let orderedDeck = [];
let idx        = 0;
let mode       = 'ge'; // 'ge' = Greek→English, 'eg' = English→Greek
let flipped    = false;
let shuffled   = false;

// ── DOM refs ────────────────────────────────────────────────────────────────
const card        = document.getElementById('card');
const frontHint   = document.getElementById('frontHint');
const frontMain   = document.getElementById('frontMain');
const frontSub    = document.getElementById('frontSub');
const backHint    = document.getElementById('backHint');
const backMain    = document.getElementById('backMain');
const backSub     = document.getElementById('backSub');
const progressEl  = document.getElementById('progress');
const progressBar = document.getElementById('progressBar');
const btnPrev     = document.getElementById('btnPrev');
const btnNext     = document.getElementById('btnNext');
const chapterGrid = document.getElementById('chapterGrid');

// ── Build chapter checkboxes ─────────────────────────────────────────────────
function buildChapterGrid() {
  chapterGrid.innerHTML = '';
  const chapters = Object.keys(vocabSets[activeSet]).map(Number).sort((a, b) => a - b);
  for (const ch of chapters) {
    const lbl = document.createElement('label');
    lbl.className = 'ch-label checked';
    lbl.innerHTML = `<input type="checkbox" value="${ch}" checked> Ch ${ch}`;
    lbl.querySelector('input').addEventListener('change', e => {
      lbl.classList.toggle('checked', e.target.checked);
      buildDeck();
    });
    chapterGrid.appendChild(lbl);
  }
}

function getCheckedChapters() {
  return [...chapterGrid.querySelectorAll('input:checked')].map(i => parseInt(i.value, 10));
}

document.getElementById('btnAll').addEventListener('click', () => {
  chapterGrid.querySelectorAll('input').forEach(i => { i.checked = true; i.closest('.ch-label').classList.add('checked'); });
  buildDeck();
});
document.getElementById('btnNone').addEventListener('click', () => {
  chapterGrid.querySelectorAll('input').forEach(i => { i.checked = false; i.closest('.ch-label').classList.remove('checked'); });
  buildDeck();
});

// ── Deck building ─────────────────────────────────────────────────────────────
function buildDeck() {
  const vocab = vocabSets[activeSet];
  const selected = getCheckedChapters();
  orderedDeck = selected.flatMap(ch => (vocab[ch] || []).map(w => ({...w, ch})));
  deck = shuffled ? shuffle([...orderedDeck]) : [...orderedDeck];
  idx = 0;
  flipped = false;
  render();
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  card.classList.remove('flipped');
  flipped = false;

  if (!deck.length) {
    frontMain.textContent  = '—';
    frontSub.textContent   = '';
    backMain.textContent   = '—';
    backSub.textContent    = '';
    progressEl.textContent = '0 / 0';
    progressBar.style.width = '0%';
    btnPrev.disabled = true;
    btnNext.disabled = true;
    return;
  }

  const w = deck[idx];
  const cognoteText = w.cognate || '';

  if (mode === 'ge') {
    // Front = Greek, Back = English (cognate on English/back)
    frontHint.textContent = 'GREEK';
    frontMain.textContent = w.greek;
    frontSub.textContent  = '';
    backHint.textContent  = 'ENGLISH';
    backMain.textContent  = w.english;
    backSub.textContent   = cognoteText;
  } else {
    // Front = English only (strip Greek-char parentheticals), Back = Greek
    const engOnly = w.english.replace(/\s*\([^)]*[\u0370-\u03FF\u1F00-\u1FFF][^)]*\)/g, '').trim();
    frontHint.textContent = 'ENGLISH';
    frontMain.textContent = engOnly;
    frontSub.textContent  = '';
    backHint.textContent  = 'GREEK';
    backMain.textContent  = w.greek;
    backSub.textContent   = '';
  }

  const n = deck.length;
  progressEl.textContent  = `${idx + 1} / ${n}`;
  progressBar.style.width = `${((idx + 1) / n) * 100}%`;
  btnPrev.disabled = idx === 0;
  btnNext.disabled = idx === n - 1;
}

// ── Actions ───────────────────────────────────────────────────────────────────
function flipCard() {
  if (!deck.length) return;
  flipped = !flipped;
  card.classList.toggle('flipped', flipped);
}

function navigate(dir) {
  const next = idx + dir;
  if (next < 0 || next >= deck.length) return;
  if (flipped) {
    card.classList.remove('flipped');
    flipped = false;
    setTimeout(() => { idx = next; render(); }, 450);
  } else {
    idx = next;
    render();
  }
}

// Keyboard
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flipCard(); }
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); navigate(1); }
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   { e.preventDefault(); navigate(-1); }
});

// ── Transliteration engine (typegreek keys → polytonic Greek) ────────────────
const TG = {
  SMOOTH: '\u0313', ROUGH: '\u0314', ACUTE: '\u0301',
  GRAVE:  '\u0300', CIRC:  '\u0342', IOTA:  '\u0345', DIAER: '\u0308',
};
const TG_ROWS = [
  ['a','α','Α'],['b','β','Β'],['g','γ','Γ'],['d','δ','Δ'],['e','ε','Ε'],
  ['z','ζ','Ζ'],['h','η','Η'],['q','θ','Θ'],['i','ι','Ι'],['k','κ','Κ'],
  ['l','λ','Λ'],['m','μ','Μ'],['n','ν','Ν'],['x','ξ','Ξ'],['o','ο','Ο'],
  ['p','π','Π'],['r','ρ','Ρ'],['s','σ','Σ'],['t','τ','Τ'],['u','υ','Υ'],
  ['f','φ','Φ'],['c','χ','Χ'],['y','ψ','Ψ'],['w','ω','Ω'],
];
const TG_MAP = {};
for (const [k, lo, hi] of TG_ROWS) { TG_MAP[k] = lo; TG_MAP[k.toUpperCase()] = hi; }
const TG_VOWELS  = new Set('αεηιουωΑΕΗΙΟΥΩ');
const TG_IOTA_V  = new Set('αηωΑΗΩ');
const TG_DIAER_V = new Set('ιυΙΥ');

let tgQ = { breathing: '', accent: '', iota: false, diaeresis: false };

function tgHas()  { return !!(tgQ.breathing || tgQ.accent || tgQ.iota || tgQ.diaeresis); }
function tgClear(){ tgQ = { breathing:'', accent:'', iota:false, diaeresis:false }; tgBadge(); }

function tgBadge() {
  const el = document.getElementById('searchPending');
  if (!el) return;
  if (!tgHas()) { el.textContent = ''; return; }
  let s = '';
  if (tgQ.breathing === 'smooth') s += ')';
  if (tgQ.breathing === 'rough')  s += '(';
  if (tgQ.accent === 'acute')     s += '/';
  if (tgQ.accent === 'grave')     s += '\\';
  if (tgQ.accent === 'circumflex') s += '=';
  if (tgQ.iota)     s += '|';
  if (tgQ.diaeresis) s += '+';
  el.textContent = s;
}

function tgCompose(base, q) {
  let s = base;
  if (q.diaeresis && TG_DIAER_V.has(base)) { s += TG.DIAER; }
  else { if (q.breathing === 'smooth') s += TG.SMOOTH; else if (q.breathing === 'rough') s += TG.ROUGH; }
  if (q.accent === 'acute') s += TG.ACUTE; else if (q.accent === 'grave') s += TG.GRAVE; else if (q.accent === 'circumflex') s += TG.CIRC;
  if (q.iota && TG_IOTA_V.has(base)) s += TG.IOTA;
  return s.normalize('NFC');
}

function tgCharBefore(el) { const p = el.selectionStart; return p > 0 ? el.value[p-1] : ''; }

function tgInsert(el, text) {
  const s = el.selectionStart, e = el.selectionEnd;
  el.value = el.value.slice(0,s) + text + el.value.slice(e);
  el.selectionStart = el.selectionEnd = s + text.length;
}

function tgReplaceLast(el, ch) {
  const p = el.selectionStart; if (!p) return;
  el.value = el.value.slice(0,p-1) + ch + el.value.slice(p);
  el.selectionStart = el.selectionEnd = p - 1 + ch.length;
}

function tgModPrev(el, type) {
  const ch = tgCharBefore(el); if (!ch) return false;
  const nfd = ch.normalize('NFD'), base = nfd[0];
  const isV = TG_VOWELS.has(base), isR = base==='ρ'||base==='Ρ';
  if (type==='smooth'||type==='rough') {
    if (!isV && !isR) return false;
    let d = nfd.split(TG.SMOOTH).join('').split(TG.ROUGH).join('');
    tgReplaceLast(el, (d + (type==='smooth'?TG.SMOOTH:TG.ROUGH)).normalize('NFC')); return true;
  }
  if (!isV) return false;
  let d = nfd;
  if (type==='acute'||type==='grave'||type==='circumflex') {
    d = d.split(TG.ACUTE).join('').split(TG.GRAVE).join('').split(TG.CIRC).join('');
    tgReplaceLast(el, (d + (type==='acute'?TG.ACUTE:type==='grave'?TG.GRAVE:TG.CIRC)).normalize('NFC')); return true;
  }
  if (type==='iota')  { if (!TG_IOTA_V.has(base)||d.includes(TG.IOTA)) return false; tgReplaceLast(el,(d+TG.IOTA).normalize('NFC')); return true; }
  if (type==='diaeresis') { if (!TG_DIAER_V.has(base)||d.includes(TG.DIAER)) return false; d=d.split(TG.SMOOTH).join('').split(TG.ROUGH).join(''); tgReplaceLast(el,(d+TG.DIAER).normalize('NFC')); return true; }
  return false;
}

// ── Search ────────────────────────────────────────────────────────────────────
function normalizeGreek(s) {
  return s.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase();
}

function searchByEN(q) {
  const lq = q.trim().toLowerCase(); if (!lq) return [];
  const out = [];
  for (const [ch, words] of Object.entries(vocabSets[activeSet]))
    for (const w of words)
      if (w.english.toLowerCase().includes(lq)) out.push({...w, ch: parseInt(ch)});
  return out.slice(0, 12);
}

function searchByGR(q) {
  const qn = normalizeGreek(q.trim()); if (!qn) return [];
  const out = [];
  for (const [ch, words] of Object.entries(vocabSets[activeSet]))
    for (const w of words)
      if (normalizeGreek(w.greek).includes(qn)) out.push({...w, ch: parseInt(ch)});
  return out.slice(0, 12);
}

const searchEN      = document.getElementById('searchEN');
const searchGR      = document.getElementById('searchGR');
const resultsEN     = document.getElementById('searchResultsEN');
const resultsGR     = document.getElementById('searchResultsGR');
let hitsEN = [], hitsGR = [];

function renderHits(hits, container) {
  if (!hits.length) {
    container.innerHTML = '<div class="search-no-results">No matches</div>';
  } else {
    container.innerHTML = hits.map((w, i) => {
      const inDeck = orderedDeck.some(d => d.greek === w.greek && d.english === w.english);
      return `<div class="search-result-item${inDeck?'':' not-in-deck'}" data-i="${i}">
        <span class="sri-greek">${w.greek}</span>
        <span class="sri-english">${w.english}</span>
        <span class="sri-ch">Ch ${w.ch}</span>
      </div>`;
    }).join('');
  }
  container.classList.add('open');
}

function jumpTo(w, inputEl, container) {
  let di = orderedDeck.findIndex(d => d.greek===w.greek && d.english===w.english);
  if (di === -1) {
    const ci = chapterGrid.querySelector(`input[value="${w.ch}"]`);
    if (ci) { ci.checked = true; ci.closest('.ch-label').classList.add('checked'); }
    buildDeck();
    di = orderedDeck.findIndex(d => d.greek===w.greek && d.english===w.english);
  }
  if (di !== -1) {
    if (shuffled) {
      shuffled = false;
      document.getElementById('btnOrdered').classList.add('active');
      document.getElementById('btnShuffled').classList.remove('active');
      deck = [...orderedDeck];
    }
    idx = di; card.classList.remove('flipped'); flipped = false; render();
  }
  inputEl.value = ''; container.classList.remove('open'); inputEl.blur();
}

// English search
searchEN.addEventListener('input', () => {
  const q = searchEN.value;
  if (!q.trim()) { resultsEN.classList.remove('open'); return; }
  hitsEN = searchByEN(q); renderHits(hitsEN, resultsEN);
});
resultsEN.addEventListener('mousedown', e => {
  e.preventDefault();
  const item = e.target.closest('.search-result-item'); if (!item) return;
  const w = hitsEN[parseInt(item.dataset.i)]; if (!w) return;
  jumpTo(w, searchEN, resultsEN);
});

// Greek search with transliteration
searchGR.addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey || e.altKey) return;
  const key = e.key;
  if (key.length > 1) { if (key==='Backspace') tgClear(); return; }

  const MOD_MAP = { ')':'smooth', '(':'rough', '/':'acute', '\\':'grave', '=':'circumflex', '|':'iota', '+':'diaeresis' };
  if (MOD_MAP[key]) {
    e.preventDefault();
    const type = MOD_MAP[key];
    if (!tgModPrev(searchGR, type)) {
      if (type==='smooth'||type==='rough')     tgQ.breathing = type;
      else if (type==='acute'||type==='grave'||type==='circumflex') tgQ.accent = type;
      else if (type==='iota')     tgQ.iota = true;
      else if (type==='diaeresis') tgQ.diaeresis = true;
    }
    tgBadge(); return;
  }

  const base = TG_MAP[key];
  if (base !== undefined) {
    e.preventDefault();
    const ch = (TG_VOWELS.has(base)||base==='ρ'||base==='Ρ') && tgHas()
      ? tgCompose(base, tgQ) : base;
    tgClear(); tgInsert(searchGR, ch);
    searchGR.dispatchEvent(new Event('input')); return;
  }
  tgClear();
});

searchGR.addEventListener('input', () => {
  const q = searchGR.value;
  if (!q.trim()) { resultsGR.classList.remove('open'); return; }
  hitsGR = searchByGR(q); renderHits(hitsGR, resultsGR);
});
resultsGR.addEventListener('mousedown', e => {
  e.preventDefault();
  const item = e.target.closest('.search-result-item'); if (!item) return;
  const w = hitsGR[parseInt(item.dataset.i)]; if (!w) return;
  tgClear(); jumpTo(w, searchGR, resultsGR);
});

document.addEventListener('click', e => {
  if (!document.getElementById('searchWrap').contains(e.target)) {
    resultsEN.classList.remove('open');
    resultsGR.classList.remove('open');
  }
});
