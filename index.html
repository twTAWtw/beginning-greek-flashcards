<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Greek Flashcards</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px;
  }

  h1 {
    font-size: 1.5rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    color: #c9a96e;
    margin-bottom: 24px;
  }

  /* Controls */
  .controls {
    display: flex;
    flex-direction: column;
    gap: 14px;
    width: 100%;
    max-width: 560px;
    margin-bottom: 28px;
  }

  .control-row {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }

  label {
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #888;
    white-space: nowrap;
  }

  /* Chapter checkboxes */
  .chapter-panel {
    width: 100%;
    background: #16213e;
    border: 1px solid #2a3a5c;
    border-radius: 10px;
    padding: 12px 14px;
  }

  .chapter-panel-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }

  .chapter-panel-header label {
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #888;
  }

  .btn-all {
    background: none;
    border: 1px solid #2a3a5c;
    border-radius: 6px;
    color: #c9a96e;
    padding: 3px 10px;
    font-size: 0.75rem;
    cursor: pointer;
    transition: background 0.15s;
  }

  .btn-all:hover { background: #1e2d4a; }

  .chapter-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .ch-label {
    display: flex;
    align-items: center;
    gap: 5px;
    background: #1a1a2e;
    border: 1px solid #2a3a5c;
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 0.82rem;
    color: #aaa;
    cursor: pointer;
    user-select: none;
    transition: border-color 0.15s, color 0.15s;
  }

  .ch-label:hover { border-color: #c9a96e; color: #e0e0e0; }

  .ch-label input { display: none; }

  .ch-label.checked {
    border-color: #c9a96e;
    background: #1e2a3e;
    color: #c9a96e;
    font-weight: 600;
  }

  .mode-toggle {
    display: flex;
    background: #16213e;
    border: 1px solid #2a3a5c;
    border-radius: 8px;
    overflow: hidden;
    flex: 1;
  }

  .mode-btn {
    flex: 1;
    padding: 8px 12px;
    background: none;
    border: none;
    color: #888;
    font-size: 0.85rem;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }

  .mode-btn.active {
    background: #c9a96e;
    color: #1a1a2e;
    font-weight: 600;
  }

  .order-toggle {
    display: flex;
    background: #16213e;
    border: 1px solid #2a3a5c;
    border-radius: 8px;
    overflow: hidden;
  }

  .order-btn {
    padding: 8px 14px;
    background: none;
    border: none;
    color: #888;
    font-size: 0.85rem;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }

  .order-btn.active {
    background: #c9a96e;
    color: #1a1a2e;
    font-weight: 600;
  }

  /* Card */
  .card-area {
    width: 100%;
    max-width: 560px;
    perspective: 1200px;
    margin-bottom: 24px;
  }

  .card {
    width: 100%;
    min-height: 240px;
    position: relative;
    cursor: pointer;
    transform-style: preserve-3d;
    transition: transform 0.45s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .card.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    inset: 0;
    min-height: 240px;
    background: #16213e;
    border: 1px solid #2a3a5c;
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 28px;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
  }

  .card-face.back { transform: rotateY(180deg); }

  .card-hint {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: #555;
    margin-bottom: 20px;
    user-select: none;
  }

  .card-main {
    font-size: 2.2rem;
    font-weight: 500;
    color: #f0e6d0;
    text-align: center;
    line-height: 1.3;
    margin-bottom: 10px;
  }

  .card-face.back .card-main {
    font-size: 1.6rem;
    color: #c9a96e;
  }

  .card-sub {
    font-size: 0.82rem;
    color: #556;
    text-align: center;
    font-style: italic;
    margin-top: 6px;
  }

  .card-face.front .card-sub {
    color: #667;
  }

  .flip-hint {
    font-size: 0.72rem;
    color: #444;
    margin-top: 18px;
    user-select: none;
  }

  /* Navigation */
  .nav {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 20px;
  }

  .nav-btn {
    background: #16213e;
    border: 1px solid #2a3a5c;
    border-radius: 10px;
    color: #c9a96e;
    width: 44px;
    height: 44px;
    font-size: 1.3rem;
    cursor: pointer;
    transition: background 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .nav-btn:hover:not(:disabled) { background: #1e2d4a; }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }

  .progress {
    font-size: 0.85rem;
    color: #666;
    min-width: 80px;
    text-align: center;
  }

  .progress-bar-wrap {
    width: 100%;
    max-width: 560px;
    height: 4px;
    background: #16213e;
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    background: #c9a96e;
    border-radius: 2px;
    transition: width 0.3s;
  }

  /* Empty state */
  .empty {
    color: #555;
    font-size: 0.9rem;
    margin-top: 40px;
  }

  /* Card wrapper needs a fixed height for absolute children */
  .card-area .card { height: 240px; }
  .card-face { height: 240px; min-height: unset; }
</style>
</head>
<body>

<h1>&#x1F4D6; Greek Flashcards</h1>

<div class="controls">
  <div class="chapter-panel">
    <div class="chapter-panel-header">
      <label>Chapters</label>
      <button class="btn-all" id="btnAll">All</button>
      <button class="btn-all" id="btnNone">None</button>
    </div>
    <div class="chapter-grid" id="chapterGrid"></div>
  </div>
  <div class="control-row">
    <label>Mode</label>
    <div class="mode-toggle">
      <button class="mode-btn active" id="btnGE">Greek → English</button>
      <button class="mode-btn" id="btnEG">English → Greek</button>
    </div>
    <div class="order-toggle">
      <button class="order-btn active" id="btnOrdered">In Order</button>
      <button class="order-btn" id="btnShuffled">Shuffled</button>
    </div>
  </div>
</div>

<div class="card-area" id="cardArea">
  <div class="card" id="card" onclick="flipCard()">
    <div class="card-face front">
      <div class="card-hint" id="frontHint">GREEK</div>
      <div class="card-main" id="frontMain">—</div>
      <div class="card-sub" id="frontSub"></div>
      <div class="flip-hint">click to reveal</div>
    </div>
    <div class="card-face back">
      <div class="card-hint" id="backHint">ENGLISH</div>
      <div class="card-main" id="backMain">—</div>
      <div class="card-sub" id="backSub"></div>
    </div>
  </div>
</div>

<div class="nav">
  <button class="nav-btn" id="btnPrev" onclick="navigate(-1)">&#8592;</button>
  <div class="progress" id="progress">0 / 0</div>
  <button class="nav-btn" id="btnNext" onclick="navigate(1)">&#8594;</button>
</div>

<div class="progress-bar-wrap">
  <div class="progress-bar" id="progressBar"></div>
</div>

// ── Parse ──────────────────────────────────────────────────────────────────
function parseVocab(raw) {
  const chapters = {};
  let current = null;
  for (const line of raw.split('\n')) {
    const trimmed = line.trim();
    if (!trimmed) continue;
    const chMatch = trimmed.match(/^## Chapter (\d+)/);
    if (chMatch) {
      current = parseInt(chMatch[1], 10);
      chapters[current] = [];
      continue;
    }
    if (current === null) continue;
    // Split on 2+ whitespace to separate Greek from English
    const parts = trimmed.split(/\s{2,}/);
    if (parts.length < 2) continue;
    const greek = parts[0].trim();
    const rest  = parts.slice(1).join(' ').trim();
    // Extract cognate in trailing parentheses (last paren group)
    const cognateMatch = rest.match(/^(.*?)\s*\(([^)]+)\)\s*$/);
    let english, cognate;
    if (cognateMatch) {
      english = cognateMatch[1].trim();
      cognate = cognateMatch[2].trim();
    } else {
      english = rest;
      cognate = '';
    }
    // Clean up trailing/leading punctuation on english
    english = english.replace(/[,;]\s*$/, '').trim();
    if (greek && english) {
      chapters[current].push({ greek, english, cognate });
    }
  }
  return chapters;
}

// ── State ───────────────────────────────────────────────────────────────────
const vocab    = parseVocab(RAW);
const chapters = Object.keys(vocab).map(Number).sort((a, b) => a - b);
let deck       = [];
let orderedDeck = [];
let idx        = 0;
let mode       = 'ge'; // 'ge' = Greek→English, 'eg' = English→Greek
let flipped    = false;
let shuffled   = false;

// ── DOM refs ────────────────────────────────────────────────────────────────
const card        = document.getElementById('card');
const frontHint   = document.getElementById('frontHint');
const frontMain   = document.getElementById('frontMain');
const frontSub    = document.getElementById('frontSub');
const backHint    = document.getElementById('backHint');
const backMain    = document.getElementById('backMain');
const backSub     = document.getElementById('backSub');
const progressEl  = document.getElementById('progress');
const progressBar = document.getElementById('progressBar');
const btnPrev     = document.getElementById('btnPrev');
const btnNext     = document.getElementById('btnNext');
const chapterGrid = document.getElementById('chapterGrid');

// ── Build chapter checkboxes ─────────────────────────────────────────────────
for (const ch of chapters) {
  const lbl = document.createElement('label');
  lbl.className = 'ch-label checked';
  lbl.innerHTML = `<input type="checkbox" value="${ch}" checked> Ch ${ch}`;
  lbl.querySelector('input').addEventListener('change', e => {
    lbl.classList.toggle('checked', e.target.checked);
    buildDeck();
  });
  chapterGrid.appendChild(lbl);
}

function getCheckedChapters() {
  return [...chapterGrid.querySelectorAll('input:checked')].map(i => parseInt(i.value, 10));
}

document.getElementById('btnAll').addEventListener('click', () => {
  chapterGrid.querySelectorAll('input').forEach(i => { i.checked = true; i.closest('.ch-label').classList.add('checked'); });
  buildDeck();
});
document.getElementById('btnNone').addEventListener('click', () => {
  chapterGrid.querySelectorAll('input').forEach(i => { i.checked = false; i.closest('.ch-label').classList.remove('checked'); });
  buildDeck();
});

// ── Deck building ─────────────────────────────────────────────────────────────
function buildDeck() {
  const selected = getCheckedChapters();
  orderedDeck = selected.flatMap(ch => (vocab[ch] || []).map(w => ({...w, ch})));
  deck = shuffled ? shuffle([...orderedDeck]) : [...orderedDeck];
  idx = 0;
  flipped = false;
  render();
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  card.classList.remove('flipped');
  flipped = false;

  if (!deck.length) {
    frontMain.textContent  = '—';
    frontSub.textContent   = '';
    backMain.textContent   = '—';
    backSub.textContent    = '';
    progressEl.textContent = '0 / 0';
    progressBar.style.width = '0%';
    btnPrev.disabled = true;
    btnNext.disabled = true;
    return;
  }

  const w = deck[idx];
  const cognoteText = w.cognate ? `cognate: ${w.cognate}` : '';

  if (mode === 'ge') {
    // Front = Greek, Back = English (cognate on English/back)
    frontHint.textContent = 'GREEK';
    frontMain.textContent = w.greek;
    frontSub.textContent  = '';
    backHint.textContent  = 'ENGLISH';
    backMain.textContent  = w.english;
    backSub.textContent   = cognoteText;
  } else {
    // Front = English (cognate on English/front), Back = Greek
    frontHint.textContent = 'ENGLISH';
    frontMain.textContent = w.english;
    frontSub.textContent  = cognoteText;
    backHint.textContent  = 'GREEK';
    backMain.textContent  = w.greek;
    backSub.textContent   = '';
  }

  const n = deck.length;
  progressEl.textContent  = `${idx + 1} / ${n}`;
  progressBar.style.width = `${((idx + 1) / n) * 100}%`;
  btnPrev.disabled = idx === 0;
  btnNext.disabled = idx === n - 1;
}

// ── Actions ───────────────────────────────────────────────────────────────────
function flipCard() {
  if (!deck.length) return;
  flipped = !flipped;
  card.classList.toggle('flipped', flipped);
}

function navigate(dir) {
  const next = idx + dir;
  if (next < 0 || next >= deck.length) return;
  idx = next;
  render();
}

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flipCard(); }
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); navigate(1); }
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   { e.preventDefault(); navigate(-1); }
});

// Mode buttons
document.getElementById('btnGE').addEventListener('click', () => {
  mode = 'ge';
  document.getElementById('btnGE').classList.add('active');
  document.getElementById('btnEG').classList.remove('active');
  render();
});
document.getElementById('btnEG').addEventListener('click', () => {
  mode = 'eg';
  document.getElementById('btnEG').classList.add('active');
  document.getElementById('btnGE').classList.remove('active');
  render();
});

// Order toggle
document.getElementById('btnOrdered').addEventListener('click', () => {
  if (shuffled) {
    shuffled = false;
    document.getElementById('btnOrdered').classList.add('active');
    document.getElementById('btnShuffled').classList.remove('active');
    deck = [...orderedDeck];
    idx = 0;
    render();
  }
});
document.getElementById('btnShuffled').addEventListener('click', () => {
  if (!shuffled) {
    shuffled = true;
    document.getElementById('btnShuffled').classList.add('active');
    document.getElementById('btnOrdered').classList.remove('active');
    deck = shuffle([...orderedDeck]);
    idx = 0;
    render();
  }
});

// Init
buildDeck();
</script>
